<!DOCTYPE html>
<html lang="{{ site.lang | default: 'ko-KR' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {% seo %}
  <link rel="icon" type="image/svg+xml" href="{{ '/favicon.svg' | relative_url }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ '/favicon-32.png' | relative_url }}">
  <link rel="icon" href="{{ '/favicon.ico' | relative_url }}" sizes="any">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ '/apple-touch-icon.png' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}?v={{ site.time | date: '%s' }}">
  {%- feed_meta -%}
  <script>
    (function () {
      try {
        var t = localStorage.getItem('theme');
        if (t !== 'light' && t !== 'dark') {
          t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-theme', t);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
    try {
      if ('serviceWorker' in navigator && !localStorage.getItem('sw-cleaned')) {
        navigator.serviceWorker.getRegistrations().then(function (rs) {
          if (rs.length) { rs.forEach(function (r) { r.unregister(); }); }
          if (window.caches && caches.keys) {
            caches.keys().then(function (ks) { ks.forEach(function (k) { caches.delete(k); }); }).catch(function () {});
          }
          try { localStorage.setItem('sw-cleaned', '1'); } catch (e) {}
        }).catch(function () {});
      }
    } catch (e) {}
  </script>
</head>
<body>
  <header class="site-header">
    <div class="wrap nav">
      <a class="brand" href="{{ '/' | relative_url }}">
        <svg class="brand-mark" width="21" height="21" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="29,29 53,50 29,71"></polyline>
          <line x1="60" y1="71" x2="80" y2="71"></line>
        </svg>
        <span class="brand-name">{{ site.title }}</span>
      </a>
      <nav class="nav-links">
        <div class="nav-search">
          <input id="nav-search" class="nav-search-input" type="search" placeholder="검색" autocomplete="off" aria-label="글 검색" role="combobox" aria-expanded="false" aria-controls="nav-search-results" aria-autocomplete="list">
          <svg class="nav-search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"></circle><path d="M21 21l-4.2-4.2"></path></svg>
          <div id="nav-search-results" class="search-dropdown" hidden></div>
        </div>
        <a href="{{ '/' | relative_url }}"{% if page.url == '/' %} class="active"{% endif %}>글</a>
        <a href="{{ '/categories/' | relative_url }}"{% if page.url contains '/categories' %} class="active"{% endif %}>카테고리</a>
        <a href="{{ '/tags/' | relative_url }}"{% if page.url contains '/tags' %} class="active"{% endif %}>태그</a>
        <a href="{{ '/about/' | relative_url }}"{% if page.url contains '/about' %} class="active"{% endif %}>소개</a>
        <a class="ext" href="https://github.com/{{ site.github_username }}">GitHub</a>
        <button id="theme-toggle" type="button" aria-label="라이트/다크 모드 전환" title="라이트/다크 전환">
          <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg>
          <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.4 1.4M17.6 17.6 19 19M19 5l-1.4 1.4M6.4 17.6 5 19"/></svg>
        </button>
      </nav>
    </div>
  </header>

  <main class="wrap{% if page.layout == 'post' %} wrap-post{% endif %}">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="wrap footer-inner">
      <span>© {{ site.time | date: "%Y" }} {{ site.title }}</span>
      <span class="colophon">Pretendard · Noto Serif KR · Jekyll</span>
    </div>
  </footer>

  <button class="to-top" type="button" aria-label="맨 위로">↑</button>

  <script>
    (function () {
      var t = document.querySelector('.to-top');
      if (t) {
        t.addEventListener('click', function () { window.scrollTo({ top: 0, behavior: 'smooth' }); });
        window.addEventListener('scroll', function () { t.classList.toggle('show', window.scrollY > 600); }, { passive: true });
      }
    })();

    function giscusTheme() {
      return document.documentElement.getAttribute('data-theme') === 'dark' ? 'noborder_dark' : 'noborder_light';
    }
    function setGiscusTheme() {
      var gf = document.querySelector('iframe.giscus-frame');
      if (gf && gf.contentWindow) {
        gf.contentWindow.postMessage({ giscus: { setConfig: { theme: giscusTheme() } } }, 'https://giscus.app');
      }
    }

    (function () {
      var btn = document.getElementById('theme-toggle');
      if (!btn) return;
      btn.addEventListener('click', function () {
        var cur = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
        var next = cur === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        try { localStorage.setItem('theme', next); } catch (e) {}
        setGiscusTheme();
        window.dispatchEvent(new Event('themechange'));
      });
    })();

    // giscus가 lazy 로드된 뒤(준비 신호) 현재 테마로 한 번 동기화 — 로드 전 토글 시 어긋남 방지
    (function () {
      var synced = false;
      window.addEventListener('message', function (e) {
        if (synced || e.origin !== 'https://giscus.app' || !e.data || !e.data.giscus) return;
        synced = true;
        setGiscusTheme();
      });
    })();

    (function () {
      var input = document.getElementById('nav-search');
      var box = document.getElementById('nav-search-results');
      if (!input || !box) return;
      var indexPromise = null, timer = null, activeIndex = -1;
      function esc(s) {
        return String(s).replace(/[&<>"']/g, function (c) {
          return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
        });
      }
      function load() {
        if (!indexPromise) {
          indexPromise = fetch('{{ "/search.json" | relative_url }}')
            .then(function (r) { if (!r.ok) throw new Error(r.status); return r.json(); })
            .catch(function (e) { indexPromise = null; throw e; });
        }
        return indexPromise;
      }
      function open() { box.hidden = false; input.setAttribute('aria-expanded', 'true'); }
      function close() { box.hidden = true; input.setAttribute('aria-expanded', 'false'); activeIndex = -1; }
      function rows() { return box.querySelectorAll('.sd-item'); }
      function setActive(i) {
        var els = rows(); if (!els.length) return;
        activeIndex = (i + els.length) % els.length;
        els.forEach(function (el, idx) { el.classList.toggle('sd-active', idx === activeIndex); });
        els[activeIndex].scrollIntoView({ block: 'nearest' });
      }
      function render(hits) {
        activeIndex = -1;
        if (!hits.length) { box.innerHTML = '<div class="sd-empty">검색 결과가 없습니다.</div>'; return; }
        box.innerHTML = hits.slice(0, 8).map(function (p) {
          return '<a class="sd-item" href="' + esc(p.url) + '">' +
            '<span class="sd-title">' + esc(p.title) + '</span>' +
            '<span class="sd-date">' + esc(p.date) + '</span></a>';
        }).join('');
      }
      function run() {
        var q = input.value.trim();
        if (!q) { close(); box.innerHTML = ''; return; }
        var lq = q.toLowerCase();
        load().then(function (data) {
          render(data.filter(function (p) {
            return (p.title + ' ' + p.tags + ' ' + p.content).toLowerCase().indexOf(lq) !== -1;
          }));
          open();
        }).catch(function () {
          box.innerHTML = '<div class="sd-empty">검색을 불러올 수 없습니다.</div>'; open();
        });
      }
      input.addEventListener('input', function () { clearTimeout(timer); timer = setTimeout(run, 130); });
      input.addEventListener('focus', function () { if (input.value.trim() && box.innerHTML) open(); });
      document.addEventListener('click', function (e) { if (!e.target.closest('.nav-search')) close(); });
      input.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') { close(); input.blur(); return; }
        if (box.hidden) return;
        if (e.key === 'ArrowDown') { e.preventDefault(); setActive(activeIndex + 1); }
        else if (e.key === 'ArrowUp') { e.preventDefault(); setActive(activeIndex - 1); }
        else if (e.key === 'Enter') {
          var els = rows();
          if (activeIndex >= 0 && els[activeIndex]) { e.preventDefault(); window.location.href = els[activeIndex].getAttribute('href'); }
        }
      });
    })();
  </script>
</body>
</html>
