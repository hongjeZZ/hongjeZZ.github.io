---
layout: default
---
<div class="entries" id="post-list" data-per-page="12">
  {%- for post in site.posts -%}
  <a class="entry" href="{{ post.url | relative_url }}" data-year="{{ post.date | date: '%Y' }}">
    <time class="entry-date" datetime="{{ post.date | date_to_xmlschema }}">{{ post.date | date: "%m.%d" }}</time>
    <span class="entry-body">
      <span class="entry-title">{{ post.title }}</span>
      {%- if post.excerpt -%}
      <span class="entry-ex">{{ post.excerpt | strip_html | strip_newlines | truncate: 84 }}</span>
      {%- endif -%}
    </span>
    <span class="entry-arrow" aria-hidden="true">→</span>
  </a>
  {%- endfor -%}
</div>

<nav class="pager" id="pager" aria-label="글 목록 페이지" hidden></nav>

<script>
  (function () {
    var list = document.getElementById('post-list');
    var pager = document.getElementById('pager');
    if (!list || !pager) return;

    var perPage = parseInt(list.getAttribute('data-per-page'), 10) || 12;
    // 서버가 렌더한 전체 .entry를 최신순 그대로 보관 (이후 페이지별로 다시 그린다)
    var entries = Array.prototype.slice.call(list.querySelectorAll('.entry'));
    var totalPages = Math.ceil(entries.length / perPage);
    var current = 1;

    // 한 페이지 분량을 그린다 — 페이지 내부에서 연도가 바뀌는 지점마다 year-head를 삽입
    function renderPage(page) {
      var start = (page - 1) * perPage;
      var slice = entries.slice(start, start + perPage);
      var frag = document.createDocumentFragment();
      var firstYearOverall = entries.length ? entries[0].getAttribute('data-year') : null;
      var lastYear = null;

      slice.forEach(function (entry) {
        var year = entry.getAttribute('data-year');
        if (year !== lastYear) {
          frag.appendChild(makeYearHead(year, page, slice, firstYearOverall));
          lastYear = year;
        }
        frag.appendChild(entry);
      });

      list.textContent = '';
      list.appendChild(frag);
    }

    // 해당 연도의 글 수(이 페이지 안에서만)와 함께 year-head를 만든다
    function makeYearHead(year, page, slice, firstYearOverall) {
      var count = 0;
      slice.forEach(function (e) { if (e.getAttribute('data-year') === year) count++; });

      var head = document.createElement('div');
      head.className = 'year-head';

      var num = document.createElement('span');
      num.className = 'year-num';
      // 전체에서 가장 최신 연도만 강조, 나머지는 흐리게 (기존 디자인 유지)
      if (year !== firstYearOverall) num.className += ' past';
      num.textContent = year;

      var rule = document.createElement('span');
      rule.className = 'year-rule';

      var cnt = document.createElement('span');
      cnt.className = 'year-count';
      cnt.textContent = count + '편';

      head.appendChild(num);
      head.appendChild(rule);
      head.appendChild(cnt);
      return head;
    }

    function makeBtn(label, page, opts) {
      opts = opts || {};
      var b = document.createElement('button');
      b.type = 'button';
      b.className = 'pager-btn' + (opts.cls ? ' ' + opts.cls : '');
      b.textContent = label;
      if (opts.aria) b.setAttribute('aria-label', opts.aria);
      if (opts.current) {
        b.setAttribute('aria-current', 'page');
        b.classList.add('is-current');
      }
      if (opts.disabled) {
        b.disabled = true;
      } else {
        b.addEventListener('click', function () { go(page); });
      }
      return b;
    }

    function renderPager() {
      pager.textContent = '';
      if (totalPages <= 1) { pager.hidden = true; return; }
      pager.hidden = false;

      pager.appendChild(makeBtn('← 이전', current - 1, {
        cls: 'pager-edge', aria: '이전 페이지', disabled: current === 1
      }));

      var nums = document.createElement('div');
      nums.className = 'pager-nums';
      for (var p = 1; p <= totalPages; p++) {
        nums.appendChild(makeBtn(String(p), p, {
          cls: 'pager-num',
          aria: p + '페이지',
          current: p === current
        }));
      }
      pager.appendChild(nums);

      pager.appendChild(makeBtn('다음 →', current + 1, {
        cls: 'pager-edge', aria: '다음 페이지', disabled: current === totalPages
      }));
    }

    function go(page) {
      if (page < 1 || page > totalPages || page === current) return;
      current = page;
      renderPage(current);
      renderPager();
      // 목록 상단으로 스크롤 (헤더 높이만큼 여유)
      var top = list.getBoundingClientRect().top + window.pageYOffset - 20;
      window.scrollTo({ top: top < 0 ? 0 : top, behavior: 'smooth' });
    }

    renderPage(current);
    renderPager();
  })();
</script>
