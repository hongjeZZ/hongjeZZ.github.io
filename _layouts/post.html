---
layout: default
---
<article class="post">
  <header class="post-header">
    <time class="post-date" datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y.%m.%d" }}</time>
    <h1 class="post-title-full">{{ page.title }}</h1>
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  {%- if page.tags.size > 0 -%}
  <div class="post-tags post-tags-footer">
    {%- for tag in page.tags -%}
    <a class="tag" href="{{ '/tags/' | relative_url }}#{{ tag | slugify }}">#{{ tag }}</a>
    {%- endfor -%}
  </div>
  {%- endif -%}
</article>
