title: hongjeZZ
tagline: 개발 학습 노트 · TIL · 기술 정리
description: >-
  백엔드·인프라·Kubernetes·JVM·이벤트 스트리밍을 공부하며 정리하는 개발 블로그.
url: "https://hongjeZZ.github.io"
baseurl: ""
lang: ko-KR
timezone: Asia/Seoul

author:
  name: hongjeZZ
github_username: hongjeZZ

permalink: /posts/:title/

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

defaults:
  - scope:
      path: ""
    values:
      image: /assets/og-default.png
  - scope:
      path: ""
      type: posts
    values:
      layout: post

exclude:
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - vendor
  - .devcontainer
  - .vscode
