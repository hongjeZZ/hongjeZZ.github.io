---
layout: default
title: 카테고리
permalink: /categories/
description: 글을 카테고리 폴더 구조로 모아 봅니다.
---
{%- assign cats = site.categories | sort -%}
{%- if cats.size == 0 -%}
<p class="muted-note">아직 카테고리가 없습니다.</p>
{%- else -%}
<script id="cat-data" type="application/json">
[
{%- for post in site.posts -%}
{"title": {{ post.title | jsonify }}, "url": {{ post.url | relative_url | jsonify }}, "date": {{ post.date | date: "%Y.%m.%d" | jsonify }}, "cats": [{% for c in post.categories %}{{ c | jsonify }}{% unless forloop.last %}, {% endunless %}{% endfor %}]}{% unless forloop.last %},{% endunless %}
{%- endfor -%}
]
</script>

<div class="cat-toolbar">
  <button type="button" id="cat-expand" class="cat-tool-btn">모두 펼치기</button>
  <button type="button" id="cat-collapse" class="cat-tool-btn">모두 접기</button>
</div>
<div id="cat-tree" class="cat-tree" role="tree" aria-label="카테고리 폴더"></div>

<script>
  (function () {
    var el = document.getElementById('cat-data');
    var mount = document.getElementById('cat-tree');
    if (!el || !mount) return;
    var posts;
    try { posts = JSON.parse(el.textContent); } catch (e) { return; }

    // 각 글의 categories 배열을 경로로 삼아 트리 구성 (글은 가장 깊은 카테고리의 잎)
    var root = { children: {}, order: [], posts: [] };
    posts.forEach(function (p) {
      var node = root;
      var path = (p.cats && p.cats.length) ? p.cats : ['미분류'];
      path.forEach(function (c) {
        if (!node.children[c]) {
          node.children[c] = { children: {}, order: [], posts: [], name: c };
          node.order.push(c);
        }
        node = node.children[c];
      });
      node.posts.push(p);
    });

    function countPosts(node) {
      var n = node.posts.length;
      node.order.forEach(function (k) { n += countPosts(node.children[k]); });
      return n;
    }

    function renderNode(node, depth) {
      var frag = document.createDocumentFragment();
      // 하위 폴더 먼저
      node.order.sort().forEach(function (key) {
        var child = node.children[key];
        var details = document.createElement('details');
        details.className = 'cat-folder';
        details.open = depth < 1; // 최상위만 기본 펼침
        details.setAttribute('role', 'treeitem');

        var summary = document.createElement('summary');
        summary.className = 'cat-folder-label';
        var name = document.createElement('span');
        name.className = 'cat-folder-name';
        name.textContent = key;
        var count = document.createElement('span');
        count.className = 'cat-folder-count';
        count.textContent = countPosts(child);
        summary.appendChild(name);
        summary.appendChild(count);
        details.appendChild(summary);

        var body = document.createElement('div');
        body.className = 'cat-folder-body';
        body.appendChild(renderNode(child, depth + 1));
        details.appendChild(body);
        frag.appendChild(details);
      });
      // 그 다음 이 폴더에 직접 속한 글(잎) — 사이트 공통 .entry 컴포넌트로 통일
      node.posts.forEach(function (p) {
        var a = document.createElement('a');
        a.className = 'entry';
        a.href = p.url;
        a.setAttribute('role', 'treeitem');
        var d = document.createElement('time');
        d.className = 'entry-date';
        d.textContent = p.date;
        var body = document.createElement('span');
        body.className = 'entry-body';
        var t = document.createElement('span');
        t.className = 'entry-title';
        t.textContent = p.title;
        body.appendChild(t);
        var arrow = document.createElement('span');
        arrow.className = 'entry-arrow';
        arrow.setAttribute('aria-hidden', 'true');
        arrow.textContent = '→';
        a.appendChild(d);
        a.appendChild(body);
        a.appendChild(arrow);
        frag.appendChild(a);
      });
      return frag;
    }

    mount.appendChild(renderNode(root, 0));

    // 모두 펼치기 / 접기
    function setAll(open) {
      Array.prototype.forEach.call(mount.querySelectorAll('details.cat-folder'), function (d) { d.open = open; });
    }
    var ex = document.getElementById('cat-expand');
    var co = document.getElementById('cat-collapse');
    if (ex) ex.addEventListener('click', function () { setAll(true); });
    if (co) co.addEventListener('click', function () { setAll(false); });
  })();
</script>
{%- endif -%}
